<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: "Manrope";
    color: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .hero-wrap {
    position: relative;
    width: 100%;
  }
  .hero {
    width: 100%;
    display: block;
  }
  .hero-wrap::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to bottom, rgba(26,26,26,0) 0%, #1a1a1a 100%);
    pointer-events: none;
  }
  .play-btn-wrap {
    padding: 0 24px;
    margin-top: 24px;
    margin-bottom: 15px;
  }
  .play-btn {
    display: block;
    width: 100%;
    padding: 18px 0;
    border: 2px solid #fff;
    border-radius: 14px;
    background: transparent;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .title {
    text-align: center;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 15px;
  }
  .title .black { color: #E3310D; }
  .title .russia { color: #fff; }
  .desc {
    padding: 0 24px;
    font-size: 14px;
    line-height: 1.5;
    color: #aaa;
    margin-bottom: 28px;
  }
  .scroll-more {
    text-align: center;
    margin-bottom: 30px;
  }
  .scroll-more-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .scroll-arrow {
    font-size: 24px;
    color: #fff;
    line-height: 1;
    animation: bounce 1.6s infinite ease-in-out;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }
  .section-title {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    text-transform: uppercase;
    line-height: 1.2;
    padding: 0 20px;
  }
  .section-title .red { color: #E3310D; }

  /* ===== МОДАЛЬНОЕ ОКНО С ЦВЕТОМ ТЕЛЕГРАМ ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    width: 100%;
    max-width: 320px;
    border-radius: 14px;
    padding: 24px;
    /* Цвет фона из темы Telegram: secondary_bg_color */
    background: var(--tg-theme-secondary-bg-color, #232e3c);
    color: var(--tg-theme-text-color, #ffffff);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--tg-theme-text-color, #ffffff);
  }
  .modal-text {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 20px;
    color: var(--tg-theme-hint-color, #aaaaaa);
  }
  .modal-btn {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    /* Цвет кнопки из темы Telegram */
    background: var(--tg-theme-button-color, #E3310D);
    color: var(--tg-theme-button-text-color, #ffffff);
  }
</style>
</head>
<body>

<div class="hero-wrap">
  <img src="header.png" alt="Black Russia" class="hero">
</div>

<div class="play-btn-wrap">
  <a href="#" class="play-btn" onclick="openModal(); return false;">Играть</a>
</div>

<div class="title">
  <span class="black">BLACK</span> <span class="russia">RUSSIA</span>
</div>

<div class="desc">
  Ролевая игра, где ты решаешь, кем быть: одиночкой или лидером, героем или теневым боссом. Прокачивайся, собирай команду и строй репутацию. Присоединяйся к миллионам и забери своё.
</div>

<div class="scroll-more">
  <div class="scroll-more-text">СМОТРИ БОЛЬШЕ</div>
  <div class="scroll-arrow"><svg width="25px" height="25px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<<path d="M12 5V19M12 19L6 13M12 19L18 13" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
</div>

<div class="section-title">
  ЧТО ТЕБЯ ЖДЁТ<br>В <span class="red">BLACK</span> RUSSIA?
</div>

<!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">Подтверждение</div>
    <div class="modal-text">Вы уверены, что хотите начать игру?</div>
    <button class="modal-btn" onclick="closeModal()">Начать</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('modal').classList.add('active');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }
  // Закрытие по клику на оверлей
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
